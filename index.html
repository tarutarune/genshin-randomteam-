<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原神ランダム編成</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 40px;
    }

    h1 {
      font-size: 32px;
    }

    button {
      padding: 12px 24px;
      font-size: 20px;
      margin-top: 20px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 24px;
      line-height: 1.8;
    }

    #character-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  margin-top: 20px;
}

.character-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  font-size: 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
    
  </style>
</head>

<body>

  <h1>原神ランダム編成</h1>

  <button onclick="randomTeam()">
    ランダム編成！
  </button>

  <div id="result"></div>

  <h2>現在実装キャラ</h2>

<div id="character-list"></div>

  <script>
    const characters = [
      "胡桃",
      "夜蘭",
      "雷電将軍",
      "ナヒーダ",
      "鍾離",
      "フリーナ",
      "万葉",
      "アルハイゼン"
    ];

    document.getElementById("character-list").innerHTML =
  characters.map(character =>
    `<div class="character-card">${character}</div>`
  ).join("");

    function randomTeam() {
      const shuffled = [...characters]
        .sort(() => 0.5 - Math.random());

      const team = shuffled.slice(0, 4);

      document.getElementById("result").innerHTML =
        team.join("<br>");
    }
  </script>

</body>
</html>
